name: Release PostKid Linux

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      tag:
        description: 'Version tag'
        required: true
        default: '1.0.0'

jobs:
  release-linux:
    name: Release Linux App
    runs-on: ubuntu-22.04
    
    steps:
      - name: Checkout source code
        uses: actions/checkout@v4

      - name: Normalise version tag
        id: normalise_version
        shell: bash
        run: |
          if [ "${{ github.event.release.tag_name }}" == "" ]; then
            version=$(echo ${{ github.event.inputs.tag }} | sed -e 's/v//g')
            echo "version=$version" >> "$GITHUB_OUTPUT"
          else
            version=$(echo ${{ github.event.release.tag_name }} | sed -e 's/v//g')
            echo "version=$version" >> "$GITHUB_OUTPUT"
          fi

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: stable
          cache: true

      - name: Install Wails
        run: go install github.com/wailsapp/wails/v2/cmd/wails@latest

      - name: Install Linux dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libgtk-3-dev libwebkit2gtk-4.0-dev libfuse-dev libfuse2 jq

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Build frontend assets
        run: |
          npm install -g npm@latest
          cd frontend
          npm install

      - name: Build Wails app for Linux
        run: |
          CGO_ENABLED=1 wails build -clean -platform linux/amd64 \
          -ldflags "-X main.version=v${{ steps.normalise_version.outputs.version }}" \
          -o PostKid

      - name: Verify build output
        run: |
          echo "=== Build directory contents ==="
          ls -la build/
          echo "=== Bin directory contents ==="
          ls -la build/bin/
          echo "=== Looking for icon ==="
          find build/ -name "*.png" -o -name "appicon*"

      - name: Create DEB package structure
        run: |
          mkdir -p build/linux/post-kid_${{ steps.normalise_version.outputs.version }}_amd64/DEBIAN
          mkdir -p build/linux/post-kid_${{ steps.normalise_version.outputs.version }}_amd64/usr/local/bin
          mkdir -p build/linux/post-kid_${{ steps.normalise_version.outputs.version }}_amd64/usr/share/applications
          mkdir -p build/linux/post-kid_${{ steps.normalise_version.outputs.version }}_amd64/usr/share/icons/hicolor/512x512/apps

      - name: Create DEBIAN control file
        run: |
          cat > build/linux/post-kid_${{ steps.normalise_version.outputs.version }}_amd64/DEBIAN/control << 'EOF'
          Package: post-kid
          Version: ${{ steps.normalise_version.outputs.version }}
          Section: utils
          Priority: optional
          Architecture: amd64
          Depends: libgtk-3-0, libwebkit2gtk-4.0-37
          Maintainer: abdelkader
          Description: PostKid - A micro API testing tool
           A lightweight and modern API testing tool built with Wails.
          EOF

      - name: Create desktop file
        run: |
          cat > build/linux/post-kid_${{ steps.normalise_version.outputs.version }}_amd64/usr/share/applications/post-kid.desktop << 'EOF'
          [Desktop Entry]
          Name=PostKid
          Comment=A micro API testing tool
          Exec=PostKid
          Icon=post-kid
          Terminal=false
          Type=Application
          Categories=Development;Network;
          EOF

      - name: Copy binary to DEB structure
        run: |
          cp build/bin/PostKid build/linux/post-kid_${{ steps.normalise_version.outputs.version }}_amd64/usr/local/bin/
          chmod +x build/linux/post-kid_${{ steps.normalise_version.outputs.version }}_amd64/usr/local/bin/PostKid

      - name: Copy icon (find it first)
        run: |
          # Chercher l'icône dans différents emplacements possibles
          if [ -f "build/appicon.png" ]; then
            cp build/appicon.png build/linux/post-kid_${{ steps.normalise_version.outputs.version }}_amd64/usr/share/icons/hicolor/512x512/apps/post-kid.png
          elif [ -f "appicon.png" ]; then
            cp appicon.png build/linux/post-kid_${{ steps.normalise_version.outputs.version }}_amd64/usr/share/icons/hicolor/512x512/apps/post-kid.png
          elif [ -f "build/bin/appicon.png" ]; then
            cp build/bin/appicon.png build/linux/post-kid_${{ steps.normalise_version.outputs.version }}_amd64/usr/share/icons/hicolor/512x512/apps/post-kid.png
          else
            echo "Warning: Icon not found, creating a placeholder"
            # Créer une icône PNG vide de 512x512 si aucune icône n'est trouvée
            convert -size 512x512 xc:lightblue build/linux/post-kid_${{ steps.normalise_version.outputs.version }}_amd64/usr/share/icons/hicolor/512x512/apps/post-kid.png || true
          fi

      - name: Build DEB package
        run: |
          cd build/linux
          dpkg-deb --build -Zxz post-kid_${{ steps.normalise_version.outputs.version }}_amd64

      - name: Build AppImage
        run: |
          # Download linuxdeploy
          curl https://github.com/linuxdeploy/linuxdeploy/releases/download/1-alpha-20240109-1/linuxdeploy-x86_64.AppImage \
                -o linuxdeploy \
                -L
          chmod +x linuxdeploy

          # Create AppDir
          ./linuxdeploy --appdir AppDir

          # Setup directories
          mkdir -p AppDir/usr/bin
          mkdir -p AppDir/usr/share/icons/hicolor/512x512/apps
          mkdir -p AppDir/usr/share/applications

          # Copy files
          build_dir="build/linux/post-kid_${{ steps.normalise_version.outputs.version }}_amd64"
          cp $build_dir/usr/local/bin/PostKid AppDir/usr/bin/
          cp $build_dir/usr/share/applications/post-kid.desktop AppDir/usr/share/applications/
          
          # Copier l'icône si elle existe
          if [ -f "$build_dir/usr/share/icons/hicolor/512x512/apps/post-kid.png" ]; then
            cp $build_dir/usr/share/icons/hicolor/512x512/apps/post-kid.png AppDir/usr/share/icons/hicolor/512x512/apps/
          fi

          # Update desktop file
          sed -i 's#/usr/local/bin/PostKid#PostKid#g' AppDir/usr/share/applications/post-kid.desktop

          # Download GTK plugin
          curl -o linuxdeploy-plugin-gtk.sh "https://raw.githubusercontent.com/tauri-apps/linuxdeploy-plugin-gtk/master/linuxdeploy-plugin-gtk.sh"
          sed -i '/XDG_DATA_DIRS/a export WEBKIT_DISABLE_COMPOSITING_MODE=1' linuxdeploy-plugin-gtk.sh
          chmod +x linuxdeploy-plugin-gtk.sh

          # Download AppRun
          curl -o AppDir/AppRun https://github.com/AppImage/AppImageKit/releases/download/continuous/AppRun-x86_64 -L
          chmod +x AppDir/AppRun

          # Build AppImage
          ./linuxdeploy --appdir AppDir \
             --output=appimage \
             --plugin=gtk \
             -e AppDir/usr/bin/PostKid \
             -d AppDir/usr/share/applications/post-kid.desktop

      - name: Rename AppImage
        run: mv PostKid-x86_64.AppImage post-kid_${{ steps.normalise_version.outputs.version }}_linux_amd64.AppImage

      - name: Upload release assets
        uses: softprops/action-gh-release@v1
        with:
          tag_name: v${{ steps.normalise_version.outputs.version }}
          files: |
            ./build/linux/post-kid_${{ steps.normalise_version.outputs.version }}_amd64.deb
            post-kid_${{ steps.normalise_version.outputs.version }}_linux_amd64.AppImage
          token: ${{ secrets.GITHUB_TOKEN }}