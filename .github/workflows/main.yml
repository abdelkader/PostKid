name: Build PostKid Windows

on:
  workflow_dispatch:  # Permet le déclenchement manuel
  push:
    tags:
      - 'v*'  # Déclenche automatiquement sur les tags (v1.0.0, etc.)

jobs:
  build-windows:
    runs-on: windows-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v3
      
      - name: Setup Go
        uses: actions/setup-go@v4
        with:
          go-version: '1.21'  # Vérifiez votre version dans go.mod
      
      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18'
      
      - name: Install Wails
        run: go install github.com/wailsapp/wails/v2/cmd/wails@latest
      
      - name: Build PostKid
        run: wails build
      
      - name: Upload executable
        uses: actions/upload-artifact@v4
        with:
          name: PostKid-Windows
          path: build/bin/*.exe
