name: Release PostKid

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            platform: windows
          - os: ubuntu-latest
            platform: linux
    
    runs-on: ${{ matrix.os }}
    
    steps:
      - name: Checkout
        uses: actions/checkout@v3
      
      - name: Setup Go
        uses: actions/setup-go@v4
        with:
          go-version: '1.21'
          cache: true  # ✅ Cache Go modules
      
      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18'
          cache: 'npm'  # ✅ Cache npm packages
      
      - name: Install Linux dependencies
        if: matrix.platform == 'linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libgtk-3-dev libwebkit2gtk-4.1-dev
      
      # ✅ Cache Wails CLI
      - name: Cache Wails
        uses: actions/cache@v3
        with:
          path: ~/go/bin
          key: ${{ runner.os }}-wails-${{ hashFiles('**/go.sum') }}
      
      - name: Install Wails
        run: go install github.com/wailsapp/wails/v2/cmd/wails@latest
      
      - name: Build PostKid (Windows)
        if: matrix.platform == 'windows'
        run: wails build -clean
      
      - name: Build PostKid (Linux)
        if: matrix.platform == 'linux'
        run: wails build -clean -tags webkit2_41
      
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v1
        with:
          files: build/bin/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}